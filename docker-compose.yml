version: '3.8'

services:
  app:
    image: ghcr.io/jcontiosochaves/proyecto-laravel:latest
    container_name: laravel_production_app
    restart: always
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/storage/database.sqlite
    volumes:
      - app_storage:/var/www/html/storage

volumes:
  app_storage: