name: Pipeline de Despliegue Continuo (CD)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticarse en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke Test (Verificar Disponibilidad del Endpoint de Login)
        env:
          APP_KEY: "base64:uP0wX6S7g3MdfK9vXzPqW2bN6tYmR4vXzPqW2bN6tYm="
          JWT_SECRET: "3wX7g3MdfK9vXzPqW2bN6tYmR4vXzPqW2bN6tYmR4vXzPqW2bN6tYmR4vXzPqW2b"
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          docker run -d -p 8000:80 \
            -e APP_KEY="$APP_KEY" \
            -e JWT_SECRET="$JWT_SECRET" \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=/tmp/database.sqlite \
            --name app_smoke_test \
            ghcr.io/$REPO_NAME:latest
          
          sleep 5
          
          docker exec app_smoke_test touch /tmp/database.sqlite
          docker exec app_smoke_test php artisan migrate --force
          docker exec app_smoke_test php artisan db:seed --force || true
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"email":"jose@example.com", "password":"password"}' \
            http://localhost:8000/api/auth/login || echo "000")
          
          docker stop app_smoke_test && docker rm app_smoke_test
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 401 ] || [ "$RESPONSE" -eq 422 ]; then
            echo "Smoke test superado exitosamente. Código HTTP válido de la app: $RESPONSE"
          else
            echo "Error: El contenedor arrojó un código inesperado o crítico: $RESPONSE"
            exit 1
          fi