name: Pipeline de Integración y Despliegue Continuo (CI/CD)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Instalar Dependencias
        run: composer install --prefer-dist --no-interaction --ignore-platform-reqs

      - name: Ejecutar Linter (Pint / PSR-12 Check)
        run: |
          if [ -f "./vendor/bin/pint" ]; then
            ./vendor/bin/pint --test || true
          else
            find app -type f -name "*.php" -print0 | xargs -0 -n1 php -l
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_sqlite, mbstring

      - name: Instalar Dependencias
        run: composer install --prefer-dist --no-interaction --ignore-platform-reqs

      - name: Preparar Entorno de Pruebas
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Ejecutar PHPUnit (Tests en Memoria)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_KEY: "base64:+LKHPKvn6N4IIp9fE60LCyk06M1bCOK/EHHfhQV4bLw="
          JWT_SECRET: "3wX7g3MdfK9vXzPqW2bN6tYmR4vXzPqW2bN6tYmR4vXzPqW2bN6tYmR4vXzPqW2b"
        run: php artisan test --stop-on-failure

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Auditoría de Seguridad (Vulnerabilidades Altas)
        run: composer audit --format=summary

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Construir Imagen Docker
        run: docker build -t proyecto-laravel:latest .

      - name: Verificar que el Contenedor Arranca Correctamente
        run: |
          docker run -d -p 8000:80 --name mi_app_laravel proyecto-laravel:latest
          sleep 5
          docker ps | grep mi_app_laravel

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Desplegar Archivos al Servidor vía SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "${{ secrets.SSH_HOST }}"
          username: "${{ secrets.SSH_USERNAME }}"
          key: "${{ secrets.SSH_KEY }}"
          port: ${{ secrets.SSH_PORT || 22 }}
          timeout: 60s
          command_timeout: 10m
          source: "."
          target: "/var/www/html/proyecto-laravel"